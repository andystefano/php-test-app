substitutions:
  _GKE_CLUSTER: autopilot-cluster-1
  _GKE_LOCATION: us-central1
  _AR_REGION: us-central1
  _AR_REPOSITORY: aplicacion
  _IMAGE_NAME: aplicacion
  _K8S_NAMESPACE: default
  _LB_STATIC_IP: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}

  - name: gcr.io/cloud-builders/gcloud
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA"
        gcloud container clusters get-credentials "${_GKE_CLUSTER}" --region="${_GKE_LOCATION}"
        kubectl delete ingress aplicacion-ingress --ignore-not-found -n "${_K8S_NAMESPACE}"
        kubectl delete service aplicacion --ignore-not-found -n "${_K8S_NAMESPACE}"
        sed "s|IMAGE_PLACEHOLDER|$$IMAGE|g" k8s/deployment.yaml | kubectl apply -n "${_K8S_NAMESPACE}" -f -
        kubectl rollout status deployment/aplicacion -n "${_K8S_NAMESPACE}" --timeout=5m
        if [ -n "${_LB_STATIC_IP}" ]; then
          echo "Usando IP estatica: ${_LB_STATIC_IP}"
          sed "s|type: LoadBalancer|type: LoadBalancer\n  loadBalancerIP: ${_LB_STATIC_IP}|" k8s/service.yaml | kubectl apply -n "${_K8S_NAMESPACE}" -f -
        else
          echo "Sin IP estatica configurada (_LB_STATIC_IP vacio); se usara IP efimera"
          kubectl apply -f k8s/service.yaml -n "${_K8S_NAMESPACE}"
        fi
        echo "=== Diagnostico ==="
        kubectl get pods -l app=aplicacion -n "${_K8S_NAMESPACE}"
        kubectl get endpoints aplicacion-service -n "${_K8S_NAMESPACE}"
        kubectl get service aplicacion-service -n "${_K8S_NAMESPACE}"
        kubectl run curl-test-$SHORT_SHA --rm -i --restart=Never --image=curlimages/curl:latest -n "${_K8S_NAMESPACE}" -- \
          curl -sf http://aplicacion-service.default.svc.cluster.local || echo "curl interno fallo"

images:
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
