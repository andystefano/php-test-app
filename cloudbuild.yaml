substitutions:
  _GKE_CLUSTER: autopilot-cluster-1
  _GKE_LOCATION: us-central1
  _AR_REGION: us-central1
  _AR_REPOSITORY: aplicacion
  _IMAGE_NAME: aplicacion
  _K8S_NAMESPACE: default

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}

  - name: gcr.io/cloud-builders/gcloud
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA"
        gcloud container clusters get-credentials "${_GKE_CLUSTER}" --region="${_GKE_LOCATION}"
        kubectl apply -f k8s/service.yaml -n "${_K8S_NAMESPACE}"
        sed "s|IMAGE_PLACEHOLDER|$$IMAGE|g" k8s/deployment.yaml | kubectl apply -n "${_K8S_NAMESPACE}" -f -
        kubectl rollout status deployment/aplicacion -n "${_K8S_NAMESPACE}" --timeout=5m

images:
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
