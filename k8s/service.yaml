apiVersion: v1
kind: Service
metadata:
  name: aplicacion-service
  labels:
    app: aplicacion
spec:
  # loadBalancerIP se inyecta en Cloud Build desde la sustitucion _LB_STATIC_IP
  # (IP estatica regional reservada). Si esta vacia, se usa una IP efimera.
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: aplicacion
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
