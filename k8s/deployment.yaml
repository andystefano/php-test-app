apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacion
  labels:
    app: aplicacion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aplicacion
  template:
    metadata:
      labels:
        app: aplicacion
    spec:
      containers:
        - name: aplicacion
          image: aplicacion
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: America/Santiago
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
